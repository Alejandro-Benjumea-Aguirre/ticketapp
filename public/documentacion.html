  <script>
    const yamlSpec = `
openapi: 3.0.3
info:
  title: TicketApp API
  description: |
    REST API backend para gestión de tickets de soporte técnico.

    ## Autenticación
    La API usa **JWT almacenado en una cookie HTTP-only** llamada \`access_token\`.

    Al hacer \`POST /api/auth/login\`, el servidor establece automáticamente la cookie en el cliente.
    No es necesario enviar ningún header de autorización manual — la cookie se envía automáticamente
    con cada petición.

    - **Expiración del token:** 4 horas
    - **Cookie:** \`access_token\` (httpOnly, SameSite: Strict, Secure en producción)
    - **Rate limit:** 100 solicitudes por IP cada 15 minutos
    - **Logout:** \`POST /api/auth/logout\` elimina la cookie inmediatamente

    > **Nota para Swagger UI:** Las peticiones desde este explorador NO incluyen la cookie automáticamente.
    > Para probar los endpoints protegidos usa **curl** con la opción \`-c cookies.txt / -b cookies.txt\`
    > o **Postman** con la opción "Send cookies" habilitada.

    ## Seguridad aplicada

    Cada solicitud pasa por las siguientes capas de protección (en orden):

    | Capa | Herramienta | Descripción |
    |------|-------------|-------------|
    | Headers HTTP | helmet | Activa ~15 headers: CSP, HSTS, X-Frame-Options, etc. |
    | CORS | cors | Solo acepta orígenes definidos en \`CORS_ORIGIN\` |
    | Rate limiting | express-rate-limit | Máx 100 req/IP cada 15 min |
    | Tamaño del body | express.json | Rechaza bodies > 10 KB |
    | Inyección NoSQL | express-mongo-sanitize | Elimina claves con \`$\` y \`.\` |
    | XSS | sanitize.js | Elimina etiquetas HTML y \`javascript:\` de los inputs |
    | HPP | hpp | Previene duplicación de parámetros en query string |
  version: 1.0.0
  contact:
    name: Alejandro Benjumea Aguirre
    url: https://www.alejodev.cloud
    email: alejo120792120792@hotmail.com

servers:
  - url: http://localhost:3000/api
    description: Servidor de desarrollo
  - url: https://tu-dominio.com/api
    description: Servidor de producción

tags:
  - name: Auth
    description: Autenticación y manejo de tokens
  - name: Tickets
    description: Gestión de tickets de soporte
  - name: Ticket Comments
    description: Comentarios y archivos adjuntos en tickets
  - name: Users
    description: Gestión de usuarios
  - name: Customers
    description: Gestión de clientes
  - name: Campus
    description: Gestión de sedes/campus
  - name: Contacts
    description: Gestión de contactos
  - name: Roles
    description: Gestión de roles
  - name: Permissions
    description: Gestión de permisos
  - name: Type Users
    description: Tipos de usuario
  - name: Preforms
    description: Preformas y plantillas
  - name: Survey
    description: Encuestas
  - name: Bitacora
    description: Bitácora de actividad

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Not found
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: "Admin123!"
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            name:
              type: string
    Ticket:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        priority_id:
          type: integer
        application_id:
          type: integer
        browser_id:
          type: integer
        sisope_id:
          type: integer
        subject:
          type: string
        description:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [abierto, cerrado, enespera]
        created_at:
          type: string
          format: date-time
    TicketCreate:
      type: object
      required: [user_id, priority_id, application_id, browser_id, sisope_id, subject, description, email]
      properties:
        user_id:
          type: integer
          example: 1
        priority_id:
          type: integer
          example: 2
        application_id:
          type: integer
          example: 3
        browser_id:
          type: integer
          example: 1
        sisope_id:
          type: integer
          example: 1
        subject:
          type: string
          example: Error al iniciar sesión
        description:
          type: string
          example: No puedo ingresar con mis credenciales
        email:
          type: string
          format: email
          example: user@example.com
    Comment:
      type: object
      properties:
        id:
          type: integer
        ticket_id:
          type: integer
        user_id:
          type: integer
        comment:
          type: string
        created_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
        uid:
          type: string
        username:
          type: string
        name:
          type: string
        email:
          type: string
        rol_id:
          type: integer
        state_id:
          type: integer
        department_id:
          type: integer
        campus_id:
          type: integer
    UserCreate:
      type: object
      required: [uid, username, name, email, rol_id, state_id, department_id, campus_id]
      properties:
        uid:
          type: string
          example: uid-abc-123
        username:
          type: string
          example: alejandro.b
        name:
          type: string
          example: Alejandro Benjumea
        email:
          type: string
          format: email
        password:
          type: string
        rol_id:
          type: integer
        state_id:
          type: integer
        department_id:
          type: integer
        campus_id:
          type: integer
    SuccessMessage:
      type: object
      properties:
        error:
          type: boolean
          example: false
        status:
          type: integer
          example: 200
        body:
          type: object
          properties:
            message:
              type: string
              example: Operación realizada correctamente.

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              \$ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                \$ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales inválidas
  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión
      description: Invalida la cookie `access_token` en el cliente. Requiere token válido para evitar llamadas anónimas.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Sesión cerrada correctamente
          content:
            application/json:
              schema:
                \$ref: '#/components/schemas/SuccessMessage'
              example:
                error: false
                status: 200
                body:
                  message: Sesión cerrada correctamente.
        '401':
          description: Token inválido o ausente
  /auth/renew:
    post:
      tags: [Auth]
      summary: Renovar token JWT
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Token renovado
        '401':
          description: Token inválido
  /auth/sendtoken:
    post:
      tags: [Auth]
      summary: Enviar token de recuperación al correo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  example: admin
      responses:
        '200':
          description: Token enviado al correo registrado
  /auth/comparetoken:
    post:
      tags: [Auth]
      summary: Verificar token de recuperación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, username]
              properties:
                token:
                  type: string
                  example: ABC123
                username:
                  type: string
                  example: admin
      responses:
        '200':
          description: Token válido
        '400':
          description: Token inválido o expirado
  /tickets:
    get:
      tags: [Tickets]
      summary: Listar todos los tickets
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  \$ref: '#/components/schemas/Ticket'
    post:
      tags: [Tickets]
      summary: Crear ticket (con archivos adjuntos, máx 6)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              \$ref: '#/components/schemas/TicketCreate'
      responses:
        '201':
          description: Ticket creado
        '400':
          description: Datos inválidos
  /tickets/abiertos:
    get:
      tags: [Tickets]
      summary: Listar tickets abiertos
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Tickets con estado abierto
  /tickets/cerrados:
    get:
      tags: [Tickets]
      summary: Listar tickets cerrados
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Tickets con estado cerrado
  /tickets/enespera:
    get:
      tags: [Tickets]
      summary: Listar tickets en espera
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Tickets con estado en espera
  /tickets/user/{id_user}:
    get:
      tags: [Tickets]
      summary: Listar tickets de un usuario
      security:
        - cookieAuth: []
      parameters:
        - name: id_user
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de tickets del usuario
  /tickets/{id}:
    get:
      tags: [Tickets]
      summary: Obtener ticket por ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ticket encontrado
        '404':
          description: No encontrado
    patch:
      tags: [Tickets]
      summary: Actualizar ticket
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Ticket actualizado
  /tickets/close/{id}:
    post:
      tags: [Tickets]
      summary: Cerrar ticket
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ticket cerrado
  /ticketComment:
    post:
      tags: [Ticket Comments]
      summary: Crear comentario con adjuntos (máx 6 archivos)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [ticket_id, user_id, coment, public]
              properties:
                ticket_id:
                  type: integer
                  example: 5
                user_id:
                  type: integer
                  example: 1
                coment:
                  type: string
                  example: Se revisó el problema y se escala a segundo nivel.
                public:
                  type: boolean
                  example: true
                  description: true = visible al cliente, false = interno
                file:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Comentario creado
  /ticketComment/{id}:
    get:
      tags: [Ticket Comments]
      summary: Obtener comentario por ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Comentario encontrado
    patch:
      tags: [Ticket Comments]
      summary: Actualizar comentario
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Actualizado
    delete:
      tags: [Ticket Comments]
      summary: Eliminar comentario
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado
  /users:
    get:
      tags: [Users]
      summary: Listar usuarios
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de usuarios
    post:
      tags: [Users]
      summary: Crear usuario (con foto de perfil)
      security:
        - cookieAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              \$ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Usuario creado
  /users/changepass/{id}:
    post:
      tags: [Users]
      summary: Cambiar contraseña de un usuario
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, newpass]
              properties:
                username:
                  type: string
                  example: admin
                newpass:
                  type: string
                  example: NuevaContrasena123!
      responses:
        '200':
          description: Contraseña actualizada correctamente
  /users/username/{username}:
    get:
      tags: [Users]
      summary: Obtener usuario por username
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario encontrado
  /users/{id}:
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
    patch:
      tags: [Users]
      summary: Actualizar usuario
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Actualizado
    delete:
      tags: [Users]
      summary: Eliminar usuario
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado
  /users/status/{id}:
    patch:
      tags: [Users]
      summary: Actualiza estado del usuario
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
      responses:
        '200':
          description: Actualizado
  /customers:
    get:
      tags: [Customers]
      summary: Listar todos los clientes
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de clientes
    post:
      tags: [Customers]
      summary: Crear cliente
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Empresa ABC S.A.S
      responses:
        '200':
          description: Cliente creado
  /customers/name/{name}:
    get:
      tags: [Customers]
      summary: Buscar cliente por nombre
      security:
        - cookieAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: Empresa ABC
      responses:
        '200':
          description: Cliente encontrado
  /customers/{id}:
    get:
      tags: [Customers]
      summary: Obtener cliente por ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cliente encontrado
    patch:
      tags: [Customers]
      summary: Actualizar cliente
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Actualizado
    delete:
      tags: [Customers]
      summary: Eliminar cliente
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado
  /campus:
    get:
      tags: [Campus]
      summary: Listar todas las sedes
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de sedes
    post:
      tags: [Campus]
      summary: Crear sede
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, client_id]
              properties:
                name:
                  type: string
                  example: Sede Norte
                client_id:
                  type: integer
                  example: 1
      responses:
        '200':
          description: Sede creada
  /campus/name/{name}:
    get:
      tags: [Campus]
      summary: Buscar sede por nombre
      security:
        - cookieAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: Sede Norte
      responses:
        '200':
          description: Sede encontrada
  /campus/client/{client_id}:
    get:
      tags: [Campus]
      summary: Listar sedes de un cliente
      security:
        - cookieAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de sedes del cliente
  /campus/{id}:
    get:
      tags: [Campus]
      summary: Obtener campus por ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Campus encontrado
    patch:
      tags: [Campus]
      summary: Actualizar campus
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Actualizado
    delete:
      tags: [Campus]
      summary: Eliminar campus
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado
  /contacts:
    get:
      tags: [Contacts]
      summary: Listar todos los contactos
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de contactos
    post:
      tags: [Contacts]
      summary: Crear contacto
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, email, clientId, campusId, typeUserId]
              properties:
                name:
                  type: string
                  example: Juan Pérez
                phone:
                  type: string
                  example: "3001234567"
                email:
                  type: string
                  format: email
                  example: juan@empresa.com
                clientId:
                  type: integer
                  example: 1
                campusId:
                  type: integer
                  example: 2
                typeUserId:
                  type: integer
                  example: 1
      responses:
        '200':
          description: Contacto creado
  /contacts/{id}:
    get:
      tags: [Contacts]
      summary: Obtener contacto por ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Contacto encontrado
    patch:
      tags: [Contacts]
      summary: Actualizar contacto
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Actualizado
    delete:
      tags: [Contacts]
      summary: Eliminar contacto
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado
  /roles:
    get:
      tags: [Roles]
      summary: Listar todos los roles
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de roles
    post:
      tags: [Roles]
      summary: Crear rol
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Soporte Nivel 2
      responses:
        '200':
          description: Rol creado
  /roles/permission/{id}:
    get:
      tags: [Roles]
      summary: Obtener permisos de un rol
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Permisos del rol
  /roles/{id}:
    get:
      tags: [Roles]
      summary: Obtener rol por ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Rol encontrado
    patch:
      tags: [Roles]
      summary: Actualizar rol
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
